<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Kitty Pomodoro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="apples-counter">🍎 <span id="apples-count">0</span></div>
    <div class="container">
        <div class="card">
            <h1 id="status-text">Hora de Focar!</h1>
            <img src="assets/hello_kitty.png" alt="Hello Kitty Focusing" id="status-image">
            <div class="timer" id="timer">25:00</div>
            <div class="controls">
                <button id="start-btn">Iniciar</button>
                <button id="pause-btn">Pausar</button>
                <button id="reset-btn">Resetar</button>
            </div>
        </div>

        <div class="store-container">
            <h2>Kitty Store</h2>
            <div class="store-grid" id="store-grid">
                <!-- Character cards will be injected here by JS -->
            </div>
        </div>
    </div>

    <!-- Celebration Modal -->
    <div id="celebration-modal" class="modal hidden">
        <div class="modal-content">
            <h2>Parabéns!</h2>
            <p>Você completou um ciclo de foco!</p>
            <p class="bonus-text">+3 🍎</p>
            <button id="close-modal-btn">Continuar</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
